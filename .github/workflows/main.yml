name: Build and deploy

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cachix
        uses: cachix/cachix-action@v17
        with:
          name: haskell-miso-cachix

      - name: Build WASM using Nix
        run: nix develop .#wasm --command bash -c "make"

      - name: Clean and GC
        run: nix-collect-garbage -d

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build

    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (attempt 2)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry_2
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (attempt 3)
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        id: deployment_retry_3
        uses: actions/deploy-pages@v5
